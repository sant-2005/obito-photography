<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Obito Photography Admin Login">
  <title>Login — Obito Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ── */
    :root {
      --card-bg: #ffffff;
      --card-border: #e4e7f0;
      --text: #1a1f36;
      --text-sub: #6b7280;
      --text-faint: #adb5c8;
      --input-bg: #ffffff;
      --input-border: #d4d8e8;
      --input-focus: #4f6dd4;
      --label: #1a1f36;
      --link: #4f6dd4;
      --btn-from: #4f6dd4;
      --btn-to: #6b5fc7;
      --toggle-bg: rgba(255,255,255,0.2);
      --toggle-border: rgba(255,255,255,0.32);
      --toggle-text: #fff;
      --shadow-card: 0 24px 64px rgba(40,50,120,0.18), 0 4px 16px rgba(40,50,120,0.1);
      --font: 'DM Sans', system-ui, sans-serif;
      --font-brand: 'DM Serif Display', Georgia, serif;
    }
    body.dark {
      --card-bg: #191c2e;
      --card-border: #272b42;
      --text: #edf0ff;
      --text-sub: #8890b4;
      --text-faint: #4a5070;
      --input-bg: #21253a;
      --input-border: #333858;
      --input-focus: #7090e8;
      --label: #c0c8f0;
      --link: #7ea4f4;
      --btn-from: #4f6dd4;
      --btn-to: #7b5ea7;
      --toggle-bg: rgba(0,0,0,0.28);
      --toggle-border: rgba(255,255,255,0.1);
      --toggle-text: #c0caee;
      --shadow-card: 0 24px 64px rgba(0,0,0,0.55), 0 4px 16px rgba(0,0,0,0.35);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background 0.5s;
    }

    /* ── Animated gradient background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg,
        #5b78d6 0%,
        #6b72cc 22%,
        #7a6ac0 42%,
        #8b68b8 62%,
        #9b70c8 80%,
        #8c6ab5 100%
      );
      background-size: 300% 300%;
      animation: bgPulse 14s ease-in-out infinite;
      z-index: -2;
      transition: opacity 0.5s;
    }
    body.dark::before {
      background: linear-gradient(135deg,
        #111840 0%,
        #1c1a42 25%,
        #241848 50%,
        #1e1238 75%,
        #160e30 100%
      );
      animation: none;
    }

    /* Subtle texture dots */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
      z-index: -1;
      pointer-events: none;
    }

    @keyframes bgPulse {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      position: fixed;
      top: 22px;
      right: 22px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px 9px 14px;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      border-radius: 99px;
      color: var(--toggle-text);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.25s, transform 0.2s, border-color 0.3s, color 0.3s;
      z-index: 200;
      letter-spacing: 0.01em;
    }
    .theme-toggle:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }
    body.dark .theme-toggle:hover { background: rgba(255,255,255,0.12); }
    .theme-toggle .t-icon { font-size: 16px; line-height: 1; }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 456px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 26px;
      padding: 50px 46px 42px;
      box-shadow: var(--shadow-card);
      transition: background 0.35s, border-color 0.35s, box-shadow 0.35s;
      animation: cardDrop 0.6s cubic-bezier(0.34, 1.35, 0.64, 1) both;
    }
    @keyframes cardDrop {
      from { opacity:0; transform:translateY(32px) scale(0.95); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .logo-box {
      width: 74px;
      height: 74px;
      border-radius: 20px;
      background: linear-gradient(145deg, #5577e0, #7b5fc8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: var(--font);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -1.5px;
      box-shadow: 0 10px 30px rgba(79,109,212,0.45), 0 2px 8px rgba(79,109,212,0.2);
      animation: logoSpin 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.08s both;
    }
    @keyframes logoSpin {
      from { opacity:0; transform:scale(0.6) rotate(-12deg); }
      to   { opacity:1; transform:scale(1) rotate(0deg); }
    }

    /* ── Titles ── */
    .brand-name {
      font-family: var(--font-brand);
      font-size: 27px;
      color: var(--text);
      text-align: center;
      letter-spacing: -0.01em;
      margin-bottom: 5px;
      transition: color 0.3s;
      animation: fadeUp 0.5s ease 0.18s both;
    }
    .brand-sub {
      font-size: 13.5px;
      color: var(--text-sub);
      text-align: center;
      font-weight: 500;
      margin-bottom: 38px;
      transition: color 0.3s;
      animation: fadeUp 0.5s ease 0.24s both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Alerts ── */
    .alert {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 12px 15px;
      border-radius: 11px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 22px;
      line-height: 1.4;
    }
    .alert.show { display: flex; animation: alertSlide 0.28s ease both; }
    @keyframes alertSlide { from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)} }
    #alertOk   { background:rgba(16,185,129,0.09); color:#065f46; border:1px solid rgba(16,185,129,0.22); }
    #alertErr  { background:rgba(239,68,68,0.08);  color:#b91c1c; border:1px solid rgba(239,68,68,0.22); }
    #alertWarn { background:rgba(245,158,11,0.09); color:#92400e; border:1px solid rgba(245,158,11,0.22); }
    body.dark #alertOk   { color:#6ee7b7; }
    body.dark #alertErr  { color:#fca5a5; }
    body.dark #alertWarn { color:#fde68a; }

    /* ── Form fields ── */
    .fg { margin-bottom: 22px; animation: fadeUp 0.45s ease both; }
    .fg:nth-child(1) { animation-delay: 0.28s; }
    .fg:nth-child(2) { animation-delay: 0.34s; }

    .fg label {
      display: block;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--label);
      margin-bottom: 9px;
      transition: color 0.3s;
    }
    .input-wrap { position: relative; }
    .fg input[type=text],
    .fg input[type=password] {
      width: 100%;
      padding: 13.5px 46px 13.5px 16px;
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      font-size: 14.5px;
      font-family: var(--font);
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.22s, box-shadow 0.22s, background 0.3s, color 0.3s;
    }
    .fg input::placeholder { color: var(--text-faint); }
    .fg input:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3.5px rgba(79,109,212,0.13);
    }
    .fg input.err-field {
      border-color: #ef4444 !important;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.13) !important;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%,60%{transform:translateX(-5px)}
      40%,80%{transform:translateX(5px)}
    }
    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 17px;
      color: var(--text-faint);
      padding: 3px;
      line-height: 1;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--input-focus); }

    /* ── Remember + Forgot ── */
    .row-mid {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
      animation: fadeUp 0.45s ease 0.40s both;
    }
    .rem-label {
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-sub);
      transition: color 0.3s;
    }
    .rem-label input[type=checkbox] {
      width: 18px;
      height: 18px;
      accent-color: var(--input-focus);
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .forgot-link {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--link);
      text-decoration: none;
      transition: opacity 0.2s, color 0.3s;
    }
    .forgot-link:hover { opacity: 0.72; }

    /* ── Attempts bar ── */
    .attempts-wrap {
      margin-bottom: 10px;
      display: none;
    }
    .attempts-wrap.show { display: block; }
    .attempts-bar {
      height: 3.5px;
      background: var(--input-border);
      border-radius: 99px;
      overflow: hidden;
    }
    .attempts-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s, background 0.4s;
      width: 100%;
      background: #10b981;
    }
    .lockout-msg {
      font-size: 12px;
      font-weight: 600;
      color: #ef4444;
      text-align: center;
      margin-top: 8px;
      display: none;
    }

    /* ── Login button ── */
    .btn-login {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--btn-from), var(--btn-to));
      color: #fff;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(79,109,212,0.38);
      transition: transform 0.22s, box-shadow 0.22s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      animation: fadeUp 0.45s ease 0.46s both;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-2.5px);
      box-shadow: 0 12px 30px rgba(79,109,212,0.48);
    }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }
    .btn-spinner {
      width: 17px; height: 17px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .btn-login.loading .btn-spinner { display: block; }
    .btn-login.loading .btn-label   { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .card-footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-faint);
      line-height: 1.75;
      transition: color 0.3s;
      animation: fadeUp 0.45s ease 0.52s both;
    }
    .card-footer a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s, opacity 0.2s;
    }
    .card-footer a:hover { opacity: 0.75; }

    @media (max-width: 500px) {
      .card { padding: 38px 22px 32px; }
      .brand-name { font-size: 23px; }
      .theme-toggle { top: 14px; right: 14px; padding: 8px 14px 8px 11px; }
    }
  </style>
</head>
<body>

  <!-- Theme toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="t-icon" id="tIcon">🌙</span>
    <span id="tLabel">Dark</span>
  </button>

  <!-- Card -->
  <div class="card" role="main">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-box">OP</div>
    </div>

    <!-- Brand -->
    <div class="brand-name">Obito Photography</div>
    <div class="brand-sub">Admin Panel Login</div>

    <!-- Alerts -->
    <div class="alert" id="alertOk"   role="status"  aria-live="polite"></div>
    <div class="alert" id="alertErr"  role="alert"   aria-live="assertive"></div>
    <div class="alert" id="alertWarn" role="status"  aria-live="polite"></div>

    <!-- Form -->
    <form id="loginForm" novalidate autocomplete="on">

      <div class="fg">
        <label for="username">Username</label>
        <div class="input-wrap">
          <input type="text" id="username" placeholder="Enter your username"
                 autocomplete="username" spellcheck="false" required>
        </div>
      </div>

      <div class="fg">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter your password"
                 autocomplete="current-password" required>
          <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password visibility">👁</button>
        </div>
      </div>

      <div class="row-mid">
        <label class="rem-label">
          <input type="checkbox" id="remember">
          Remember Me
        </label>
        <a href="#" class="forgot-link" id="forgotLink">Forgot Password?</a>
      </div>

      <!-- Attempts indicator -->
      <div class="attempts-wrap" id="attemptsWrap">
        <div class="attempts-bar">
          <div class="attempts-fill" id="attemptsFill"></div>
        </div>
      </div>
      <div class="lockout-msg" id="lockoutMsg"></div>

      <!-- Submit -->
      <button type="submit" class="btn-login" id="loginBtn">
        <div class="btn-spinner"></div>
        <span class="btn-label">Login to Dashboard</span>
      </button>

    </form>

    <!-- Footer -->
    <div class="card-footer">
      © 2026 Obito Photography Management System<br>
      Owned by <a href="mailto:obito@photography.in">@obito.photography</a>
    </div>

  </div><!-- /card -->

<script>
  /* ═══════════════════════════════════════════════════════════
     CREDENTIALS — edit users here
     ═══════════════════════════════════════════════════════════ */
  const USERS = [
    { username: 'admin',   password: 'Admin@2026',  displayName: 'Administrator' },
    { username: 'obito',   password: 'Obito@2026',  displayName: 'Obito'         },
    { username: 'manager', password: 'Manager@123', displayName: 'Manager'       },
  ];

  const MAX_ATTEMPTS = 5;
  const LOCKOUT_SECS = 30;

  /* ── State ── */
  let failCount  = parseInt(sessionStorage.getItem('loginFails') || '0');
  let lockoutEnd = parseInt(sessionStorage.getItem('lockoutEnd')  || '0');
  let lockTimer  = null;

  /* ═══════════════════════════════════════════════════════════
     THEME
     ═══════════════════════════════════════════════════════════ */
  const $body  = document.body;
  const $tBtn  = document.getElementById('themeToggle');
  const $tIcon = document.getElementById('tIcon');
  const $tLbl  = document.getElementById('tLabel');

  function setTheme(dark) {
    $body.classList.toggle('dark', dark);
    $tIcon.textContent = dark ? '☀️' : '🌙';
    $tLbl.textContent  = dark ? 'Light' : 'Dark';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }
  setTheme(localStorage.getItem('theme') === 'dark');
  $tBtn.addEventListener('click', () => setTheme(!$body.classList.contains('dark')));

  /* ═══════════════════════════════════════════════════════════
     AUTO-REDIRECT
     ═══════════════════════════════════════════════════════════ */
  if (sessionStorage.getItem('loggedIn') === 'true') {
    window.location.replace('dashboard.html');
  }

  /* ═══════════════════════════════════════════════════════════
     REMEMBER USERNAME
     ═══════════════════════════════════════════════════════════ */
  const $savedUser = localStorage.getItem('rememberedUser');
  if ($savedUser) {
    document.getElementById('username').value   = $savedUser;
    document.getElementById('remember').checked = true;
  }

  /* ═══════════════════════════════════════════════════════════
     PASSWORD TOGGLE
     ═══════════════════════════════════════════════════════════ */
  const $pw  = document.getElementById('password');
  const $eye = document.getElementById('eyeBtn');
  $eye.addEventListener('click', () => {
    const show = $pw.type === 'password';
    $pw.type = show ? 'text' : 'password';
    $eye.textContent = show ? '🙈' : '👁';
    $pw.focus();
  });

  /* ═══════════════════════════════════════════════════════════
     ALERTS
     ═══════════════════════════════════════════════════════════ */
  function showAlert(id, msg) {
    ['alertOk','alertErr','alertWarn'].forEach(i => {
      const el = document.getElementById(i);
      el.textContent = '';
      el.classList.remove('show');
    });
    if (!id || !msg) return;
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }

  /* ═══════════════════════════════════════════════════════════
     ATTEMPTS BAR
     ═══════════════════════════════════════════════════════════ */
  function refreshBar() {
    const wrap = document.getElementById('attemptsWrap');
    const fill = document.getElementById('attemptsFill');
    if (failCount === 0) { wrap.classList.remove('show'); return; }
    wrap.classList.add('show');
    const pct = Math.max(0, ((MAX_ATTEMPTS - failCount) / MAX_ATTEMPTS) * 100);
    fill.style.width      = pct + '%';
    fill.style.background = pct > 60 ? '#10b981' : pct > 30 ? '#f59e0b' : '#ef4444';
  }
  refreshBar();

  /* ═══════════════════════════════════════════════════════════
     LOCKOUT
     ═══════════════════════════════════════════════════════════ */
  function isLockedOut() { return Date.now() < lockoutEnd; }

  function beginLockout() {
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('lockoutMsg');
    btn.disabled      = true;
    msg.style.display = 'block';
    clearInterval(lockTimer);
    lockTimer = setInterval(() => {
      const left = Math.ceil((lockoutEnd - Date.now()) / 1000);
      if (left <= 0) {
        clearInterval(lockTimer);
        btn.disabled      = false;
        msg.style.display = 'none';
        failCount = 0;
        sessionStorage.removeItem('loginFails');
        sessionStorage.removeItem('lockoutEnd');
        refreshBar();
        showAlert(null, '');
      } else {
        msg.textContent = `⏳ Locked — retry in ${left}s`;
        showAlert('alertWarn', `Too many failed attempts. Wait ${left} seconds before trying again.`);
      }
    }, 500);
  }

  /* Resume lockout across page refresh */
  if (isLockedOut()) {
    beginLockout();
    showAlert('alertWarn', 'Account temporarily locked. Please wait.');
  }

  /* ═══════════════════════════════════════════════════════════
     FORGOT PASSWORD
     ═══════════════════════════════════════════════════════════ */
  document.getElementById('forgotLink').addEventListener('click', e => {
    e.preventDefault();
    showAlert('alertWarn', '🔑 Please contact your system administrator to reset your password.');
  });

  /* ═══════════════════════════════════════════════════════════
     LOGIN HANDLER
     ═══════════════════════════════════════════════════════════ */
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if (isLockedOut()) {
      showAlert('alertWarn', 'Account is locked. Please wait.');
      return;
    }

    const u   = document.getElementById('username').value.trim().toLowerCase();
    const p   = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    showAlert(null, '');

    if (!u || !p) {
      showAlert('alertErr', '⚠️ Please enter both your username and password.');
      return;
    }

    /* Loading state */
    btn.disabled = true;
    btn.classList.add('loading');

    /* Simulate network delay (replace with real API call if needed) */
    setTimeout(() => {
      const match = USERS.find(usr =>
        usr.username.toLowerCase() === u && usr.password === p
      );

      btn.classList.remove('loading');

      if (match) {
        /* ── SUCCESS ── */
        failCount = 0;
        sessionStorage.removeItem('loginFails');
        sessionStorage.removeItem('lockoutEnd');

        if (document.getElementById('remember').checked) {
          localStorage.setItem('rememberedUser', match.username);
        } else {
          localStorage.removeItem('rememberedUser');
        }

        sessionStorage.setItem('loggedIn',  'true');
        sessionStorage.setItem('username',  match.displayName);
        sessionStorage.setItem('loginTime', new Date().toISOString());

        showAlert('alertOk', `✅ Welcome back, ${match.displayName}! Redirecting to dashboard…`);
        setTimeout(() => window.location.href = 'dashboard.html', 1100);

      } else {
        /* ── FAILURE ── */
        btn.disabled = false;
        failCount++;
        sessionStorage.setItem('loginFails', failCount);
        refreshBar();

        const left = MAX_ATTEMPTS - failCount;

        if (failCount >= MAX_ATTEMPTS) {
          lockoutEnd = Date.now() + LOCKOUT_SECS * 1000;
          sessionStorage.setItem('lockoutEnd', lockoutEnd);
          beginLockout();
          showAlert('alertWarn', `🔒 Too many wrong attempts. Locked for ${LOCKOUT_SECS} seconds.`);
        } else {
          showAlert('alertErr', left === 1
            ? '❌ Wrong credentials. ⚠️ Last attempt before lockout!'
            : `❌ Incorrect username or password. ${left} attempt${left > 1 ? 's' : ''} remaining.`
          );
        }

        /* Visual feedback */
        $pw.classList.add('err-field');
        setTimeout(() => $pw.classList.remove('err-field'), 700);
        $pw.value = '';
        $pw.focus();
      }
    }, 680);
  });

  /* ── Enter key on username jumps to password ── */
  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); $pw.focus(); }
  });
</script>
</body>
</html>
